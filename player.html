<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watching - FreeMoviesHUB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-top">
            <button class="menu-btn" onclick="toggleSidebar()">☰</button>
            <a href="index.html" class="logo-link"><h1 class="logo">FreeMovies<span class="green">HUB</span></h1></a>
            <div class="spacer"></div>
        </div>
        <div class="search-container">
    <input type="text" 
           placeholder="Search for movies..." 
           id="searchBox" 
           onkeyup="if(event.key === 'Enter') executeSearch(this.value)">
</div>


    </nav>

    <div id="sidebar" class="sidebar">
    <a href="javascript:void(0)" class="closebtn" onclick="toggleSidebar(false)">×</a>
    <a href="#" onclick="navigateTo('index.html')">Home</a>
    <a href="#" onclick="filterByCategory('trending')">Trending</a>
    <a href="#" onclick="filterByCategory('top-imdb')">Top IMDb</a>
    <a href="#" onclick="filterByCategory('new-release')">New Release</a>
</div>


    <div class="player-section">
        <div class="aspect-ratio-box">
            <iframe id="videoPlayer" 
        src="" 
        width="100%" 
        height="100%" 
        frameborder="0" 
        allowfullscreen 
        referrerpolicy="origin"
        allow="autoplay; encrypted-media">
</iframe>


        </div>
        
        <div class="details-container">
            <h1 id="mTitle"></h1>
            <div class="meta-row">
                <span id="mDate"></span> • <span id="mRuntime"></span> • <span id="mType"></span>
            </div>
            <p id="mDesc" class="movie-desc"></p>
            <a id="mDownload" href="#" class="download-btn" target="_blank">DOWNLOAD NOW</a>
        </div>
    </div>

    
    <div id="loader-container" class="loader-hidden">
    <div class="spinner"></div>
    <p>Loading Movies...</p>
</div>

    
    <script src="script.js"></script>
    <script>window.onload = loadPlayerData;</script>
</body>
</html>
