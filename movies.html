<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeMoviesHUB | Stream High Quality</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="sidebar-overlay" id="overlay" onclick="toggleMenu()"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">Free<span>Movies</span>HUB</div>
            <div class="close-btn" onclick="toggleMenu()">&times;</div>
        </div>
        <nav class="sidebar-nav">
            <a href="#"><i class="fas fa-home"></i> Home</a>
            <a href="#"><i class="fas fa-fire"></i> Trending</a>
            <a href="#"><i class="fas fa-compact-disc"></i> New Releases</a>
            <a href="#"><i class="fas fa-star"></i> Top IMDb</a>
            <div class="separator"></div>
            <a href="#"><i class="fas fa-ghost"></i> Horror</a>
            <a href="#"><i class="fas fa-rocket"></i> Sci-Fi</a>
            <a href="#"><i class="fas fa-mask"></i> Action</a>
        </nav>
    </aside>

    <header>
        <div class="nav-main">
            <button class="menu-trigger" onclick="toggleMenu()">
                <i class="fas fa-bars"></i>
            </button>
            <div class="logo">Free<span>Movies</span>HUB</div>
            <div class="spacer"></div> </div>
        
        <div class="search-container">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Quick search movies..." id="movieSearch">
            </div>
        </div>
    </header>
   <main class="container">
    <h1 class="section-title" style="margin: 20px 0;">All Movies Library</h1>
    <div id="all-movies-grid" class="movie-grid"></div>
</main>
    <script src="movie-data.js"></script>

    <script src="script.js"></script>
</body>
</html>
