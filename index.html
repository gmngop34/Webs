<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeMoviesHUB - Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-top">
            <button class="menu-btn" onclick="toggleSidebar()">☰</button>
            <h1 class="logo">FreeMovies<span class="green">HUB</span></h1>
            <div class="spacer"></div> </div>
        <div class="search-container">
    <input type="text" 
           placeholder="Search for movies..." 
           id="searchBox" 
           onkeyup="if(event.key === 'Enter') executeSearch(this.value)">
</div>


    </nav>

    <div id="sidebar" class="sidebar">
    <a href="javascript:void(0)" class="closebtn" onclick="toggleSidebar(false)">×</a>
    <a href="#" onclick="navigateTo('index.html')">Home</a>
    <a href="#" onclick="filterByCategory('trending')">Trending</a>
    <a href="#" onclick="filterByCategory('top-imdb')">Top IMDb</a>
    <a href="#" onclick="filterByCategory('new-release')">New Release</a>
</div>



    <div class="category-bar">
    <button class="cat-pill" onclick="filterByCategory('all')">All</button>
    <button class="cat-pill" onclick="filterByCategory('featured')">Featured</button>
    <button class="cat-pill" onclick="filterByCategory('trending')">Trending</button>
    <button class="cat-pill" onclick="filterByCategory('top-imdb')">Top IMDb</button>
</div>



    <main class="container">
        <h2 class="section-title">Featured Movies</h2>
        <div class="movie-grid" id="featuredGrid"></div>
        
        <div class="button-wrapper">
    <button onclick="navigateTo('movies.html')" class="netflix-btn">View All Movies</button>
</div>

    </main>

    <a href="mailto:contact@example.com" class="floating-contact">🎧</a>

    
    <div id="loader-container" class="loader-hidden">
    <div class="spinner"></div>
    <p>Loading Movies...</p>
</div>

    
    
    
    <script src="script.js"></script>
    <script>
        window.onload = () => displayMovies(allMovies.slice(0, 8), 'featuredGrid');
    </script>
</body>
</html>
